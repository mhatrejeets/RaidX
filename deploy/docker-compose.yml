services:
  mongo:
    image: mongo:6
    container_name: raidx-mongo
    restart: always
    command: ["mongod", "--bind_ip_all"]
    environment:
      MONGO_INITDB_DATABASE: raidx
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "ps -o comm= 1 | grep -q '^mongod$'"]
      interval: 180s
      timeout: 5s
      retries: 5

  raidx:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: raidx-app
    depends_on:
      - mongo
      - redis
    environment:
      MONGO_URI: mongodb://mongo:27017/raidx
      REDIS_URL: redis://redis:6379
      JWT_SECRET: f44dfcbf3ea8e48544df68e56320f36457bb3ef6b608d3beb0b6b7e6dc5af137
      PORT: 3000
      APP_LOG_DIR: /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ../Static:/app/Static
      - ../views:/app/views
      - ../.env:/app/.env
      - ../logs/app:/app/logs

  redis:
    image: redis:7
    container_name: raidx-redis
    restart: always
    ports:
      - "6379:6379"

  seed:
    image: mongo:6
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    environment:
      MONGO_URI: mongodb://mongo:27017/raidx
      SEED_DATA_DIR: /seed-data
    volumes:
      - ../dummy_data:/seed-data:ro
      - ../scripts/seed.sh:/seed.sh:ro
    entrypoint: ["sh", "/seed.sh"]

volumes:
  mongo_data:
