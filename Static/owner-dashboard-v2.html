<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RaidX - Team Owner Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <script src="/static/auth.js"></script>
  <style>
    body {
      background: linear-gradient(145deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      padding: 2rem 0;
    }

    .navbar {
      background-color: rgba(0, 0, 0, 0.85);
      padding: 1rem 2rem;
      margin-bottom: 2rem;
    }

    .navbar-brand {
      font-weight: bold;
      color: #f97316 !important;
      font-size: 1.5rem;
    }

    .nav-link {
      color: #cbd5e1 !important;
    }

    .nav-link:hover {
      color: #f97316 !important;
    }

    .container {
      max-width: 1200px;
    }

    .dashboard-header {
      margin-bottom: 3rem;
    }

    .dashboard-header h1 {
      color: #fbbf24;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .dashboard-header p {
      color: #cbd5e1;
    }

    .tabs-section {
      margin-bottom: 3rem;
    }

    .nav-tabs {
      border-bottom: 2px solid #334155;
    }

    .nav-tabs .nav-link {
      color: #cbd5e1;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 1rem 1.5rem;
      transition: all 0.3s ease;
    }

    .nav-tabs .nav-link:hover {
      color: #f97316;
      border-bottom-color: #f97316;
    }

    .nav-tabs .nav-link.active {
      color: #f97316;
      border-bottom-color: #f97316;
      background-color: transparent;
    }

    .tab-content {
      margin-top: 2rem;
    }

    .card {
      background-color: #1e293b;
      border: 1px solid #334155;
      color: white;
    }

    .card-header {
      background-color: #0f172a;
      border-bottom: 1px solid #334155;
    }

    .btn-primary-orange {
      background: linear-gradient(45deg, #f97316, #ea580c);
      color: white;
      border: none;
      font-weight: bold;
      border-radius: 0.5rem;
      padding: 0.5rem 1.5rem;
      transition: all 0.3s ease;
    }

    .btn-primary-orange:hover {
      background: linear-gradient(45deg, #ea580c, #f97316);
      color: white;
      transform: scale(1.02);
    }

    .btn-sm {
      padding: 0.35rem 0.75rem;
      font-size: 0.875rem;
    }

    .team-card {
      background-color: rgba(30, 41, 59, 0.8);
      border: 2px solid #334155;
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .team-card:hover {
      border-color: #f97316;
      box-shadow: 0 0 15px rgba(249, 115, 22, 0.3);
      transform: translateY(-2px);
    }

    .team-card h5 {
      color: #fbbf24;
      margin-bottom: 0.5rem;
    }

    .team-card p {
      color: #cbd5e1;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .team-card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .badge-custom {
      background-color: #334155;
      color: #f97316;
      padding: 0.35rem 0.75rem;
      border-radius: 0.25rem;
      font-size: 0.85rem;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #cbd5e1;
    }

    .empty-state i {
      font-size: 3rem;
      color: #f97316;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .request-card {
      background-color: rgba(30, 41, 59, 0.8);
      border-left: 4px solid #f97316;
      padding: 1.5rem;
      margin-bottom: 1rem;
      border-radius: 0.5rem;
    }

    .request-card h6 {
      color: #fbbf24;
    }

    .request-card p {
      color: #cbd5e1;
      margin-bottom: 0.5rem;
    }

    .request-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .spinner-border-sm {
      width: 1rem;
      height: 1rem;
    }
  </style>
</head>

<body data-role="team_owner">
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">
        <i class="bi bi-lightning-fill"></i> RaidX
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="ms-auto d-flex gap-2">
          <a class="btn btn-outline-light btn-sm" id="owner-profile-link" href="#">
            <i class="bi bi-person-circle"></i> My Profile
          </a>
          <button class="btn btn-outline-light btn-sm" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i> Logout
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <!-- Header -->
    <div class="dashboard-header">
      <h1><i class="bi bi-shield-fill"></i> Team Owner Dashboard</h1>
      <p>Manage your teams and player memberships</p>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs tabs-section" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="teams-tab" data-bs-toggle="tab" data-bs-target="#teams" type="button"
          role="tab">
          <i class="bi bi-shield-check"></i> My Teams
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="tournaments-tab" data-bs-toggle="tab" data-bs-target="#tournaments" type="button"
          role="tab">
          <i class="bi bi-trophy"></i> Event Invitations
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="create-tab" data-bs-toggle="tab" data-bs-target="#create" type="button"
          role="tab">
          <i class="bi bi-plus-circle"></i> Create Team
        </button>
      </li>
    </ul>

    <!-- Tab Content -->
    <div class="tab-content">
      <!-- My Teams Tab -->
      <div class="tab-pane fade show active" id="teams" role="tabpanel">
        <div id="teamsContainer"></div>
      </div>

      <!-- Event Invitations Tab -->
      <div class="tab-pane fade" id="tournaments" role="tabpanel">
        <div class="section-header mb-4">
          <h4>Event Invitations</h4>
          <button class="btn btn-sm btn-outline-light" id="owner-event-refresh">
            <i class="bi bi-arrow-clockwise"></i> Refresh
          </button>
        </div>
        <ul class="nav nav-tabs" id="ownerEventInvitesTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="owner-event-pending-tab" data-bs-toggle="tab" data-bs-target="#owner-event-pending" type="button" role="tab">
              <i class="bi bi-clock"></i> Pending
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="owner-event-accepted-tab" data-bs-toggle="tab" data-bs-target="#owner-event-accepted" type="button" role="tab">
              <i class="bi bi-check-circle"></i> Accepted
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="owner-event-declined-tab" data-bs-toggle="tab" data-bs-target="#owner-event-declined" type="button" role="tab">
              <i class="bi bi-x-circle"></i> Declined
            </button>
          </li>
        </ul>
        <div class="tab-content mt-3">
          <div class="tab-pane fade show active" id="owner-event-pending" role="tabpanel">
            <div id="owner-event-invites-pending"></div>
          </div>
          <div class="tab-pane fade" id="owner-event-accepted" role="tabpanel">
            <div id="owner-event-invites-accepted"></div>
          </div>
          <div class="tab-pane fade" id="owner-event-declined" role="tabpanel">
            <div id="owner-event-invites-declined"></div>
          </div>
        </div>
      </div>

      <!-- Create Team Tab -->
      <div class="tab-pane fade" id="create" role="tabpanel">
        <div class="card">
          <div class="card-header">
            <h5 class="mb-0">Create New Team</h5>
          </div>
          <div class="card-body">
            <form id="createTeamForm" onsubmit="createTeam(event)">
              <div class="mb-3">
                <label for="teamName" class="form-label">Team Name</label>
                <input type="text" class="form-control" id="teamName" name="teamName" placeholder="Enter team name"
                  required>
              </div>
              <button type="submit" class="btn btn-primary-orange">
                <i class="bi bi-plus-circle"></i> Create Team
              </button>
              <div id="createMessage" style="margin-top: 1rem;"></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script src="/static/rbac-dashboard.js"></script>
  <script>
    // Check if token is in URL (from returnUrl redirect)
    const urlParams = new URLSearchParams(window.location.search);
    const urlToken = urlParams.get('token');
    
    if (urlToken) {
      localStorage.setItem('token', urlToken);
      localStorage.setItem('jwtToken', urlToken);
      // Remove token from URL and reload
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    // Get token from localStorage (set during login)
    const token = localStorage.getItem('token');

    // Redirect to login if no token
    if (!token) {
      window.location.href = '/login?returnUrl=' + encodeURIComponent('/owner/dashboard');
    }

    async function loadTeams() {
      try {
        const response = await fetch('/api/owner/teams', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (response.ok) {
          const teams = await response.json();
          renderTeams(teams);
        } else {
          const container = document.getElementById('teamsContainer');
          container.innerHTML = '<div class="alert alert-danger">Failed to load teams</div>';
        }
      } catch (error) {
        console.error('Error loading teams:', error);
        const container = document.getElementById('teamsContainer');
        container.innerHTML = '<div class="alert alert-danger">Error loading teams</div>';
      }
    }

    function renderTeams(teams) {
      const container = document.getElementById('teamsContainer');
      
      if (!teams || teams.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="bi bi-inbox"></i>
            <h5>No Teams Yet</h5>
            <p>Create your first team to get started</p>
          </div>
        `;
        return;
      }

      container.innerHTML = teams.map(team => {
        return `
        <div class="team-card" onclick="goToTeamDetail('${team.ID}')">
          <h5><i class="bi bi-shield-check"></i> ${team.TeamName}</h5>
          <p><i class="bi bi-people"></i> ${typeof team.Players === 'number' ? team.Players : (team.Players ? team.Players.length : 0)} Players</p>
          <p class="text-muted mb-0"><small>Created: ${new Date(team.CreatedAt).toLocaleDateString()}</small></p>
          <div class="team-card-actions" onclick="event.stopPropagation()">
            <button class="btn btn-primary-orange btn-sm" onclick="viewTeam('${team.ID}')">
              <i class="bi bi-eye"></i> View
            </button>
            <button class="btn btn-warning btn-sm" onclick="editTeam('${team.ID}')">
              <i class="bi bi-pencil"></i> Edit
            </button>
            <button class="btn btn-danger btn-sm" onclick="deleteTeam('${team.ID}')">
              <i class="bi bi-trash"></i> Delete
            </button>
          </div>
        </div>
      `;
      }).join('');
    }


    async function createTeam(event) {
      event.preventDefault();
      
      const teamName = document.getElementById('teamName').value;

      try {
        const response = await fetch('/api/teams', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ team_name: teamName })
        });

        if (response.ok) {
          const data = await response.json();
          alert('✅ Team created! Redirecting...');
          setTimeout(() => {
            window.location.href = `/owner/team/${data.team_id}/edit`;
          }, 500);
        } else {
          const errorData = await response.json();
          console.error('Create team error:', errorData);
          alert('❌ Failed to create team: ' + (errorData.error || response.statusText));
        }
      } catch (error) {
        console.error('Error creating team:', error);
        alert('❌ Error creating team: ' + error.message);
      }
    }

    function viewTeam(teamId) {
      window.location.href = `/owner/team/${teamId}`;
    }

    function editTeam(teamId) {
      window.location.href = `/owner/team/${teamId}/edit`;
    }

    function goToTeamDetail(teamId) {
      window.location.href = `/owner/team/${teamId}`;
    }

    async function deleteTeam(teamId) {
      if (confirm('Are you sure you want to delete this team?')) {
        try {
          const response = await fetch(`/api/teams/${teamId}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
          });

          if (response.ok) {
            alert('✅ Team deleted successfully');
            loadTeams();
          } else {
            alert('❌ Failed to delete team');
          }
        } catch (error) {
          console.error('Error deleting team:', error);
          alert('❌ Error deleting team');
        }
      }
    }


    function logout() {
      fetch('/logout', { method: 'POST' }).then(() => {
        window.location.href = '/login';
      });
    }

    // Load on page load
    window.addEventListener('load', () => {
      loadTeams();
    });
  </script>
</body>

</html>
