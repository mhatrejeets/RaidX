<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RaidX - Team Pending Approvals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <script src="/static/auth.js"></script>
  <style>
    body {
      background: linear-gradient(145deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      padding: 2rem 0;
    }

    .navbar {
      background-color: rgba(0, 0, 0, 0.85);
      padding: 1rem 2rem;
      margin-bottom: 2rem;
    }

    .navbar-brand {
      font-weight: bold;
      color: #f97316 !important;
      font-size: 1.5rem;
    }

    .container {
      max-width: 1200px;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .page-header h1 {
      color: #fbbf24;
      font-weight: bold;
    }

    .card {
      background-color: #1e293b;
      border: 1px solid #334155;
      color: white;
      margin-bottom: 1.5rem;
    }

    .card-header {
      background-color: #0f172a;
      border-bottom: 1px solid #334155;
    }

    .approval-card {
      background-color: rgba(30, 41, 59, 0.8);
      border: 2px solid #334155;
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
    }

    .approval-card:hover {
      border-color: #f97316;
      box-shadow: 0 0 15px rgba(249, 115, 22, 0.3);
    }

    .approval-card h5 {
      color: #fbbf24;
      margin-bottom: 0.5rem;
    }

    .approval-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin: 1rem 0;
    }

    .approval-info-item {
      font-size: 0.9rem;
    }

    .approval-info-item strong {
      color: #cbd5e1;
    }

    .btn-approve {
      background: linear-gradient(45deg, #22c55e, #16a34a);
      color: white;
      border: none;
      font-weight: bold;
      border-radius: 0.5rem;
      padding: 0.5rem 1.5rem;
      transition: all 0.3s ease;
    }

    .btn-approve:hover {
      background: linear-gradient(45deg, #16a34a, #22c55e);
      color: white;
      transform: scale(1.02);
    }

    .btn-reject {
      background: linear-gradient(45deg, #ef4444, #dc2626);
      color: white;
      border: none;
      font-weight: bold;
      border-radius: 0.5rem;
      padding: 0.5rem 1.5rem;
      transition: all 0.3s ease;
    }

    .btn-reject:hover {
      background: linear-gradient(45deg, #dc2626, #ef4444);
      color: white;
      transform: scale(1.02);
    }

    .btn-primary-orange {
      background: linear-gradient(45deg, #f97316, #ea580c);
      color: white;
      border: none;
      font-weight: bold;
      border-radius: 0.5rem;
      padding: 0.5rem 1.5rem;
      transition: all 0.3s ease;
    }

    .btn-primary-orange:hover {
      background: linear-gradient(45deg, #ea580c, #f97316);
      color: white;
      transform: scale(1.02);
    }

    .badge-type {
      font-size: 0.85rem;
      padding: 0.35rem 0.75rem;
    }

    .badge-player {
      background-color: #3b82f6;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
    }

    .empty-state i {
      font-size: 4rem;
      color: #475569;
      margin-bottom: 1rem;
    }

    .empty-state p {
      color: #94a3b8;
      font-size: 1.1rem;
    }
  </style>
</head>
<body data-role="owner">
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">
        <i class="bi bi-lightning-fill"></i> RaidX
      </a>
      <div class="ms-auto d-flex gap-2 align-items-center">
        <a class="btn btn-outline-light btn-sm" href="/owner/dashboard">
          <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h1><i class="bi bi-clipboard-check"></i> Team Pending Approvals</h1>
          <p style="color: #cbd5e1;">Review and approve pending player join requests</p>
        </div>
        <button class="btn btn-primary-orange" onclick="location.reload()">
          <i class="bi bi-arrow-repeat"></i> Refresh
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h5 class="mb-0">Team Player Requests</h5>
      </div>
      <div class="card-body">
        <div id="team-approvals-list"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    async function apiRequest(url, options = {}) {
      const token = getValidToken();
      if (!token) {
        window.location.href = '/login';
        throw new Error('No token');
      }
      const headers = { 'Authorization': `Bearer ${token}`, ...options.headers };
      const response = await fetch(url, { ...options, headers });
      if (response.status === 401) {
        localStorage.removeItem('token');
        window.location.href = '/login';
      }
      return response;
    }

    async function loadTeamApprovals() {
      if (!requireAuth()) return;
      
      try {
        const teams = await (await apiRequest('/api/owner/teams')).json();
        if (!teams.data || teams.data.length === 0) {
          document.getElementById('team-approvals-list').innerHTML = 
            '<div class="empty-state"><i class="bi bi-inbox"></i><p>No teams yet.</p></div>';
          return;
        }

        let html = '';
        for (const team of teams.data) {
          try {
            const approvalsRes = await apiRequest(`/api/teams/${team._id || team.id}/pending-approvals`);
            const approvals = await approvalsRes.json();
            
            if (approvals && approvals.length > 0) {
              html += `<h6 style="color: #fbbf24; margin-top: 1.5rem;">${team.teamName || team.name}</h6>`;
              approvals.forEach(approval => {
                html += renderApproval(approval);
              });
            }
          } catch (e) {
            console.error('Error loading approvals for team', team._id, e);
          }
        }

        if (!html) {
          document.getElementById('team-approvals-list').innerHTML = 
            '<div class="empty-state"><i class="bi bi-check-circle"></i><p>No pending approvals!</p></div>';
        } else {
          document.getElementById('team-approvals-list').innerHTML = html;
        }
      } catch (error) {
        console.error('Failed to load team approvals:', error);
        document.getElementById('team-approvals-list').innerHTML = 
          '<div style="color: #ef4444;"><i class="bi bi-exclamation-circle"></i> Failed to load approvals.</div>';
      }
    }

    function renderApproval(approval) {
      return `
        <div class="approval-card">
          <div class="d-flex justify-content-between align-items-start">
            <div class="flex-grow-1">
              <div>
                <h5>${approval.playerName}</h5>
                <span class="badge badge-player"><i class="bi bi-person-fill"></i> PLAYER</span>
              </div>
              <div class="approval-info">
                <div class="approval-info-item">
                  <strong>Email:</strong> ${approval.playerEmail}
                </div>
                <div class="approval-info-item">
                  <strong>Status:</strong> ${approval.status}
                </div>
                <div class="approval-info-item">
                  <strong>Requested:</strong> ${new Date(approval.createdAt).toLocaleDateString()}
                </div>
              </div>
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-approve btn-sm" onclick="approveApproval('${approval._id || approval.id}')">
                <i class="bi bi-check"></i> Approve
              </button>
              <button class="btn btn-reject btn-sm" onclick="rejectApproval('${approval._id || approval.id}')">
                <i class="bi bi-x"></i> Reject
              </button>
            </div>
          </div>
        </div>
      `;
    }

    async function approveApproval(id) {
      if (!confirm('Approve this player?')) return;
      
      try {
        const res = await apiRequest(`/api/pending-approvals/${id}/approve`, { method: 'PUT' });
        if (res.ok) {
          alert('Approved successfully!');
          loadTeamApprovals();
        } else {
          const err = await res.json();
          alert('Error: ' + (err.error || 'Failed to approve'));
        }
      } catch (error) {
        console.error('Error approving:', error);
        alert('Failed to approve. Check console.');
      }
    }

    async function rejectApproval(id) {
      if (!confirm('Reject this request?')) return;
      
      try {
        const res = await apiRequest(`/api/pending-approvals/${id}/reject`, { method: 'PUT' });
        if (res.ok) {
          alert('Rejected successfully!');
          loadTeamApprovals();
        } else {
          const err = await res.json();
          alert('Error: ' + (err.error || 'Failed to reject'));
        }
      } catch (error) {
        console.error('Error rejecting:', error);
        alert('Failed to reject. Check console.');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!requireAuth()) return;
      loadTeamApprovals();
    });
  </script>
  <script src="/static/branding.js"></script>
</body>
</html>
