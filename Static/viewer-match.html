<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RaidX - Match Score</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(145deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      padding: 2rem 0;
    }
    .card {
      background-color: #1e293b;
      border: 1px solid #334155;
      color: white;
    }
    .card-header {
      background-color: #0f172a;
      border-bottom: 1px solid #334155;
    }
    .summary-item {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1rem;
      height: 100%;
    }
    .summary-label {
      color: #94a3b8;
      font-size: 0.85rem;
      margin-bottom: 0.25rem;
    }
    .summary-value {
      font-weight: 600;
      color: #fbbf24;
    }
    .player-row {
      border-bottom: 1px solid #334155;
      padding: 0.75rem 0;
    }
    .muted { color: #94a3b8; }
    .btn-orange {
      background: linear-gradient(45deg, #f97316, #ea580c);
      color: white;
      border: none;
      font-weight: bold;
      border-radius: 0.5rem;
      padding: 0.5rem 1.25rem;
    }
  </style>
</head>
<body>
  <div class="container" style="max-width: 1100px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="mb-0" style="color:#fbbf24;">Match Score</h2>
      <div>
        <button class="btn btn-orange me-2" id="goto-event-btn" style="display: none;">Go to Event</button>
        <button class="btn btn-outline-light me-2" id="share-match-btn" type="button">
          <i class="bi bi-share"></i> Share
        </button>
        <a id="match-overview-link" class="btn btn-outline-light me-2" href="#">Match Overview</a>
        <a id="dashboard-link" class="btn btn-outline-light me-2" href="#" style="display:none;">
          <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a class="btn btn-outline-light" href="/viewer">Back to Viewer</a>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-header">
        <h5 class="mb-0">Score Summary</h5>
      </div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-4">
            <div class="summary-item">
              <div class="summary-label">Team A</div>
              <div class="summary-value" id="match-teamA">-</div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="summary-item">
              <div class="summary-label">Team B</div>
              <div class="summary-value" id="match-teamB">-</div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="summary-item">
              <div class="summary-label">Event Type</div>
              <div class="summary-value" id="match-event-type">-</div>
            </div>
          </div>
        </div>
        <div class="row g-3 mt-2">
          <div class="col-md-4">
            <div class="summary-item">
              <div class="summary-label">Winner</div>
              <div class="summary-value" id="match-winner">-</div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="summary-item">
              <div class="summary-label">Toss Won By</div>
              <div class="summary-value" id="match-toss-winner">-</div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="summary-item">
              <div class="summary-label">Decided To</div>
              <div class="summary-value" id="match-toss-decision">-</div>
            </div>
          </div>
        </div>
        <div class="row g-3 mt-2">
          <div class="col-md-4">
            <div class="summary-item">
              <div class="summary-label">MVP</div>
              <div class="summary-value" id="match-award-mvp">-</div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="summary-item">
              <div class="summary-label">Best Raider</div>
              <div class="summary-value" id="match-award-raider">-</div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="summary-item">
              <div class="summary-label">Best Defender</div>
              <div class="summary-value" id="match-award-defender">-</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Match Scorecard</h5>
        <div class="muted" id="match-id">Match: -</div>
      </div>
      <div class="card-body" id="player-stats">
        <div class="row g-3">
          <div class="col-md-6">
            <div style="background:rgba(15,23,42,0.6);border:1px solid rgba(255,255,255,0.1);border-radius:0.75rem;padding:1rem;">
              <h6 id="scorecard-teamA" style="color:#fbbf24;margin-bottom:1rem;">Team A</h6>
              <div id="scorecard-teamA-list">Loading stats...</div>
            </div>
          </div>
          <div class="col-md-6">
            <div style="background:rgba(15,23,42,0.6);border:1px solid rgba(255,255,255,0.1);border-radius:0.75rem;padding:1rem;">
              <h6 id="scorecard-teamB" style="color:#fbbf24;margin-bottom:1rem;">Team B</h6>
              <div id="scorecard-teamB-list">Loading stats...</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/share-utils.js"></script>
  <script>
    const matchId = window.location.pathname.split('/').pop();
    const matchIdEl = document.getElementById('match-id');
    if (matchIdEl) matchIdEl.textContent = `Match: ${matchId}`;
    const shareMatchBtn = document.getElementById('share-match-btn');
    if (shareMatchBtn) {
      shareMatchBtn.onclick = () => {
        const link = buildViewerShareLink('match', matchId);
        shareViewerLink(link, { title: 'Share Match Viewer Link', copiedMessage: 'Match viewer link copied.' });
      };
    }
    const matchOverviewLink = document.getElementById('match-overview-link');
    if (matchOverviewLink) matchOverviewLink.href = `/viewer/match/${matchId}/overview`;

    function renderPlayerStats(stats, teamAName = 'Team A', teamBName = 'Team B', roles = {}, teamIds = {}) {
      const listA = document.getElementById('scorecard-teamA-list');
      const listB = document.getElementById('scorecard-teamB-list');
      const labelA = document.getElementById('scorecard-teamA');
      const labelB = document.getElementById('scorecard-teamB');
      if (!listA || !listB || !labelA || !labelB) return;

      labelA.textContent = teamAName || 'Team A';
      labelB.textContent = teamBName || 'Team B';

      if (!stats || Object.keys(stats).length === 0) {
        listA.innerHTML = '<div class="muted">No player stats available.</div>';
        listB.innerHTML = '<div class="muted">No player stats available.</div>';
        return;
      }

      const entries = Object.entries(stats).map(([key, value]) => ({
        id: value.id || value.ID || key,
        data: value,
      }));

      const teamAIdList = Array.isArray(teamIds.teamAPlayerIds) ? teamIds.teamAPlayerIds.map(id => String(id)) : [];
      const teamBIdList = Array.isArray(teamIds.teamBPlayerIds) ? teamIds.teamBPlayerIds.map(id => String(id)) : [];
      const setA = new Set(teamAIdList);
      const setB = new Set(teamBIdList);

      const teamACaptainId = roles.teamACaptainId || '';
      const teamAViceCaptainId = roles.teamAViceCaptainId || '';
      const teamBCaptainId = roles.teamBCaptainId || '';
      const teamBViceCaptainId = roles.teamBViceCaptainId || '';

      const teamAPlayers = [];
      const teamBPlayers = [];
      const unknownPlayers = [];

      entries.forEach(entry => {
        const playerId = String(entry.id || '');
        if (setA.has(playerId)) {
          teamAPlayers.push(entry);
        } else if (setB.has(playerId)) {
          teamBPlayers.push(entry);
        } else {
          unknownPlayers.push(entry);
        }
      });

      if (setA.size === 0 && setB.size === 0) {
        const splitIndex = Math.ceil(entries.length / 2);
        teamAPlayers.length = 0;
        teamBPlayers.length = 0;
        teamAPlayers.push(...entries.slice(0, splitIndex));
        teamBPlayers.push(...entries.slice(splitIndex));
      } else if (unknownPlayers.length) {
        teamAPlayers.push(...unknownPlayers);
      }

      const getPrefix = (entry, side) => {
        const stat = entry?.data || {};
        const id = entry?.id || '';
        const isCaptain = stat.isCaptain || stat.IsCaptain || false;
        const isViceCaptain = stat.isViceCaptain || stat.IsViceCaptain || false;
        if (side === 'A') {
          if (id === teamACaptainId || isCaptain) return '(C) ';
          if (id === teamAViceCaptainId || isViceCaptain) return '(VC) ';
          return '';
        }
        if (id === teamBCaptainId || isCaptain) return '(C) ';
        if (id === teamBViceCaptainId || isViceCaptain) return '(VC) ';
        return '';
      };

      const renderCards = (arr, side) => {
        if (!arr.length) return '<div class="muted">No players available.</div>';
        return arr.map(p => {
          const stat = p.data || {};
          const name = stat.name || stat.Name || 'Player';
          const displayName = `${getPrefix(p, side)}${name}`;
          const raid = stat.raidPoints ?? stat.RaidPoints ?? 0;
          const def = stat.defencePoints ?? stat.DefencePoints ?? 0;
          const total = stat.totalPoints ?? stat.TotalPoints ?? 0;
          const superRaids = stat.superRaids ?? stat.SuperRaids ?? 0;
          const superTackles = stat.superTackles ?? stat.SuperTackles ?? 0;
          const status = (stat.status || stat.Status || '').toLowerCase();
          const statusBadge = status === 'out'
            ? '<span style="color:#f87171;font-weight:600;">OUT</span>'
            : '<span style="color:#34d399;font-weight:600;">IN</span>';
          const profileUrl = p.id ? `/playerprofile/${encodeURIComponent(p.id)}` : '#';

          return `
            <a href="${profileUrl}" style="text-decoration:none;color:inherit;">
              <div style="border:1px solid rgba(255,255,255,0.1);background:rgba(30,41,59,0.7);border-radius:0.6rem;padding:0.75rem;margin-bottom:0.75rem;cursor:pointer;transition:all 0.2s ease;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.35rem;">
                  <div style="font-weight:700;color:#fbbf24;">${displayName}</div>
                  <div>${statusBadge}</div>
                </div>
                <div style="display:flex;gap:1rem;flex-wrap:wrap;color:#e2e8f0;">
                  <div>Raid: <strong>${raid}</strong></div>
                  <div>Defence: <strong>${def}</strong></div>
                  <div>Total: <strong>${total}</strong></div>
                  <div>Super Raids: <strong>${superRaids}</strong></div>
                  <div>Super Tackles: <strong>${superTackles}</strong></div>
                </div>
              </div>
            </a>
          `;
        }).join('');
      };

      listA.innerHTML = renderCards(teamAPlayers, 'A');
      listB.innerHTML = renderCards(teamBPlayers, 'B');
    }

    async function loadMatchScore() {
      try {
        const res = await fetch(`/api/match/${matchId}`);
        const data = await res.json();
        if (!res.ok || !data || !data.data) {
          throw new Error((data && data.error) || 'Match not found');
        }
        const match = data.data;
        const teamAName = match.teamA?.name || 'Team A';
        const teamBName = match.teamB?.name || 'Team B';
        const teamAScore = match.teamA?.score ?? 0;
        const teamBScore = match.teamB?.score ?? 0;
        
        // Read event type from the new event_type field (with fallback to old type field)
        let eventType = 'Match';
        if (data.eventType) {
          eventType = data.eventType.charAt(0).toUpperCase() + data.eventType.slice(1);
        } else if (data.event_type) {
          eventType = data.event_type.charAt(0).toUpperCase() + data.event_type.slice(1);
        } else if (data.type || data.Type) {
          eventType = (data.type || data.Type).charAt(0).toUpperCase() + (data.type || data.Type).slice(1);
        }

        document.getElementById('match-teamA').textContent = `${teamAName} (${teamAScore})`;
        document.getElementById('match-teamB').textContent = `${teamBName} (${teamBScore})`;
        document.getElementById('match-event-type').textContent = eventType;

        let winner = 'Draw';
        if (teamAScore > teamBScore) winner = teamAName;
        if (teamBScore > teamAScore) winner = teamBName;
        document.getElementById('match-winner').textContent = winner;

        const tossWinner = match.tossWinner || match.data?.tossWinner || data.data?.tossWinner || data.tossWinner;
        const tossDecision = match.tossDecision || match.data?.tossDecision || data.data?.tossDecision || data.tossDecision;
        const tossWinnerName = tossWinner === 'teamB' ? teamBName : (tossWinner === 'teamA' ? teamAName : '-');
        const tossDecisionText = tossDecision === 'defend' ? 'Defend First' : (tossDecision ? 'Raid First' : '-');
        document.getElementById('match-toss-winner').textContent = tossWinnerName || '-';
        document.getElementById('match-toss-decision').textContent = tossDecisionText || '-';

        const awards = match.awards || match.data?.awards || data.data?.awards || data.awards || {};
        const mvp = awards.mvp || {};
        const bestRaider = awards.bestRaider || {};
        const bestDefender = awards.bestDefender || {};
        const formatAward = (a) => (a && a.name ? `${a.name} (${a.points ?? 0})` : '-');
        document.getElementById('match-award-mvp').textContent = formatAward(mvp);
        document.getElementById('match-award-raider').textContent = formatAward(bestRaider);
        document.getElementById('match-award-defender').textContent = formatAward(bestDefender);

        // Show "Go to Event" button if match is part of tournament or championship
        const rawEventType = (data.eventType || data.event_type || '').toLowerCase();
        const eventId = data.eventId || data.event_id;
        if ((rawEventType === 'tournament' || rawEventType === 'championship') && eventId) {
          const eventBtn = document.getElementById('goto-event-btn');
          const buttonText = rawEventType === 'tournament' ? 'Go to Tournament' : 'Go to Championship';
          eventBtn.textContent = buttonText;
          eventBtn.style.display = 'inline-block';
          eventBtn.onclick = () => {
            window.location.href = `/viewer/${rawEventType}/${eventId}`;
          };
        }

        renderPlayerStats(match.playerStats || data.playerStats || {}, teamAName, teamBName, {
          teamACaptainId: match.teamACaptainId || data.teamACaptainId,
          teamAViceCaptainId: match.teamAViceCaptainId || data.teamAViceCaptainId,
          teamBCaptainId: match.teamBCaptainId || data.teamBCaptainId,
          teamBViceCaptainId: match.teamBViceCaptainId || data.teamBViceCaptainId,
        }, {
          teamAPlayerIds: match.teamAPlayerIds || match.teamAPlayerIDs || data.teamAPlayerIds || data.teamAPlayerIDs || [],
          teamBPlayerIds: match.teamBPlayerIds || match.teamBPlayerIDs || data.teamBPlayerIds || data.teamBPlayerIDs || [],
        });
      } catch (e) {
        const container = document.getElementById('player-stats');
        if (container) container.innerHTML = `<div class="text-danger">${e.message}</div>`;
      }
    }

    loadMatchScore();

    // Setup dashboard link
    const dashboardLink = document.getElementById('dashboard-link');
    if (dashboardLink && typeof getRoleFromToken === 'function') {
      const role = getRoleFromToken();
      if (role) {
        const dashboardPaths = {
          'player': '/player/dashboard',
          'owner': '/owner/dashboard',
          'organizer': '/organizer/dashboard'
        };
        const path = dashboardPaths[role.toLowerCase()];
        if (path) {
          dashboardLink.href = path;
          dashboardLink.style.display = 'inline-block';
        }
      }
    }
  </script>
  <script src="/static/auth.js"></script>
  <script src="/static/branding.js"></script>
</body>
</html>
