<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RaidX - Create Invite Links</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <script src="/static/auth.js"></script>
  <style>
    body {
      background: linear-gradient(145deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      padding: 2rem 0;
    }

    .navbar {
      background-color: rgba(0, 0, 0, 0.85);
      padding: 1rem 2rem;
      margin-bottom: 2rem;
    }

    .navbar-brand {
      font-weight: bold;
      color: #f97316 !important;
      font-size: 1.5rem;
    }

    .container {
      max-width: 1200px;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .page-header h1 {
      color: #fbbf24;
      font-weight: bold;
    }

    .card {
      background-color: #1e293b;
      border: 1px solid #334155;
      color: white;
      margin-bottom: 1.5rem;
    }

    .card-header {
      background-color: #0f172a;
      border-bottom: 1px solid #334155;
    }

    .form-control,
    .form-select {
      background-color: #0f172a;
      border: 1px solid #334155;
      color: white;
    }

    .form-control:focus,
    .form-select:focus {
      background-color: #0f172a;
      border-color: #f97316;
      color: white;
      box-shadow: 0 0 0 0.2rem rgba(249, 115, 22, 0.25);
    }

    .form-label {
      color: #cbd5e1;
      font-weight: 500;
    }

    .btn-primary-orange {
      background: linear-gradient(45deg, #f97316, #ea580c);
      color: white;
      border: none;
      font-weight: bold;
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      transition: all 0.3s ease;
    }

    .btn-primary-orange:hover {
      background: linear-gradient(45deg, #ea580c, #f97316);
      color: white;
      transform: scale(1.02);
    }

    .invite-link-card {
      background-color: rgba(30, 41, 59, 0.8);
      border: 2px solid #334155;
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
    }

    .invite-link-card:hover {
      border-color: #22c55e;
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
    }

    .invite-link-card h5 {
      color: #fbbf24;
      margin-bottom: 0.5rem;
    }

    .invite-link-code {
      background-color: #0f172a;
      border: 1px solid #475569;
      border-radius: 0.5rem;
      padding: 0.75rem;
      font-family: monospace;
      font-size: 0.9rem;
      margin: 0.5rem 0;
      word-break: break-all;
    }

    .badge-active {
      background-color: #22c55e;
    }

    .badge-expired {
      background-color: #ef4444;
    }

    .badge-limited {
      background-color: #f97316;
    }

    .btn-copy {
      background-color: #334155;
      border: 1px solid #475569;
      color: white;
      padding: 0.35rem 0.75rem;
      font-size: 0.85rem;
      border-radius: 0.35rem;
      transition: all 0.3s ease;
    }

    .btn-copy:hover {
      background-color: #475569;
      color: #fbbf24;
    }

    .btn-delete {
      background-color: #ef4444;
      border: 1px solid #dc2626;
      color: white;
      padding: 0.35rem 0.75rem;
      font-size: 0.85rem;
      border-radius: 0.35rem;
      transition: all 0.3s ease;
    }

    .btn-delete:hover {
      background-color: #dc2626;
      color: white;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
    }

    .empty-state i {
      font-size: 4rem;
      color: #475569;
      margin-bottom: 1rem;
    }

    .empty-state p {
      color: #94a3b8;
      font-size: 1.1rem;
    }

    .info-text {
      background-color: rgba(59, 130, 246, 0.1);
      border-left: 4px solid #3b82f6;
      padding: 0.75rem;
      border-radius: 0.35rem;
      font-size: 0.9rem;
      color: #bfdbfe;
      margin-top: 0.5rem;
    }

    .success-text {
      color: #22c55e;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body data-role="owner">
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">
        <i class="bi bi-lightning-fill"></i> RaidX
      </a>
      <div class="ms-auto d-flex gap-2 align-items-center">
        <a class="btn btn-outline-light btn-sm" href="/owner/dashboard">
          <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h1><i class="bi bi-link-45deg"></i> Create Invite Links</h1>
          <p style="color: #cbd5e1;">Generate shareable links to invite players to your teams</p>
        </div>
      </div>
    </div>

    <!-- Create New Invite Link -->
    <div class="card">
      <div class="card-header">
        <h5 class="mb-0">Create New Invite Link</h5>
      </div>
      <div class="card-body">
        <form id="createInviteForm">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="inviteTarget" class="form-label">Select Team</label>
              <select class="form-select" id="inviteTarget" required>
                <option value="">Select a team...</option>
              </select>
            </div>

            <div class="col-md-6 mb-3">
              <label for="expiresIn" class="form-label">Expires In</label>
              <select class="form-select" id="expiresIn">
                <option value="1h">1 Hour</option>
                <option value="24h">24 Hours</option>
                <option value="7d" selected>7 Days</option>
                <option value="30d">30 Days</option>
                <option value="never">Never</option>
              </select>
              <div class="info-text">
                <i class="bi bi-info-circle"></i> Link expiration time
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="maxUses" class="form-label">Max Uses (Leave blank for unlimited)</label>
              <input type="number" class="form-control" id="maxUses" min="1" placeholder="Unlimited" />
              <div class="info-text">
                <i class="bi bi-info-circle"></i> How many times the link can be used
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label for="inviteMessage" class="form-label">Invite Message (Optional)</label>
            <textarea class="form-control" id="inviteMessage" rows="3" placeholder="Add a custom message for invitees..."></textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary-orange">
              <i class="bi bi-plus-circle"></i> Create Invite Link
            </button>
            <button type="reset" class="btn btn-outline-secondary">Clear</button>
          </div>

          <div id="createMessage" style="margin-top: 1rem;"></div>
        </form>
      </div>
    </div>

    <!-- Active Invite Links -->
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Your Invite Links</h5>
        <button class="btn btn-sm btn-outline-light" onclick="loadInviteLinks()">
          <i class="bi bi-arrow-repeat"></i> Refresh
        </button>
      </div>
      <div class="card-body">
        <div id="inviteLinksContainer"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    async function apiRequest(url, options = {}) {
      const token = getValidToken();
      if (!token) {
        window.location.href = '/login';
        throw new Error('No token');
      }
      const headers = { 'Authorization': `Bearer ${token}`, ...options.headers };
      const response = await fetch(url, { ...options, headers });
      if (response.status === 401) {
        localStorage.removeItem('token');
        window.location.href = '/login';
      }
      return response;
    }

    async function loadTeams() {
      try {
        const res = await apiRequest('/api/owner/teams');
        const data = await res.json();
        const targetSelect = document.getElementById('inviteTarget');
        targetSelect.innerHTML = '<option value="">Select a team...</option>';
        
        if (data.data) {
          data.data.forEach(team => {
            const option = document.createElement('option');
            option.value = team._id || team.id;
            option.textContent = team.teamName || team.name;
            targetSelect.appendChild(option);
          });
        }
      } catch (e) {
        console.error('Failed to load teams:', e);
      }
    }

    document.getElementById('createInviteForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const targetId = document.getElementById('inviteTarget').value;
      const expiresIn = document.getElementById('expiresIn').value;
      const maxUses = document.getElementById('maxUses').value || null;
      const message = document.getElementById('inviteMessage').value;

      if (!targetId) {
        alert('Please select a team');
        return;
      }

      try {
        const res = await apiRequest('/api/owner/invite-links', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            teamId: targetId,
            expiresIn,
            maxUses: maxUses ? parseInt(maxUses) : null,
            message
          })
        });

        const messageDiv = document.getElementById('createMessage');
        if (res.ok) {
          const data = await res.json();
          messageDiv.innerHTML = `<div class="alert alert-success"><i class="bi bi-check-circle"></i> Invite link created successfully!</div>`;
          document.getElementById('createInviteForm').reset();
          loadInviteLinks();
          setTimeout(() => messageDiv.innerHTML = '', 3000);
        } else {
          const err = await res.json();
          messageDiv.innerHTML = `<div class="alert alert-danger"><i class="bi bi-exclamation-circle"></i> ${err.error || 'Failed to create invite link'}</div>`;
        }
      } catch (error) {
        console.error('Error creating invite link:', error);
        document.getElementById('createMessage').innerHTML = 
          `<div class="alert alert-danger"><i class="bi bi-exclamation-circle"></i> Error: ${error.message}</div>`;
      }
    });

    async function loadInviteLinks() {
      if (!requireAuth()) return;

      try {
        const res = await apiRequest('/api/owner/invite-links');
        const data = await res.json();
        const container = document.getElementById('inviteLinksContainer');

        if (!data.data || data.data.length === 0) {
          container.innerHTML = 
            '<div class="empty-state"><i class="bi bi-link-45deg"></i><p>No invite links created yet.</p></div>';
          return;
        }

        let html = '';
        data.data.forEach(link => {
          const isExpired = new Date(link.expiresAt) < new Date();
          const isLimited = link.maxUses && link.usesCount >= link.maxUses;
          const badgeClass = isExpired ? 'badge-expired' : isLimited ? 'badge-limited' : 'badge-active';
          const statusText = isExpired ? 'Expired' : isLimited ? 'Limited' : 'Active';
          const inviteUrl = `${window.location.origin}/invite/team/${link.code}`;

          html += `
            <div class="invite-link-card">
              <div class="d-flex justify-content-between align-items-start">
                <div class="flex-grow-1">
                  <div class="d-flex align-items-center gap-2">
                    <h5><i class="bi bi-people-fill"></i> ${link.teamName}</h5>
                    <span class="badge ${badgeClass}">${statusText}</span>
                  </div>
                  <p style="color: #94a3b8; margin: 0.5rem 0;">Code: <strong>${link.code}</strong></p>
                  <div class="invite-link-code">${inviteUrl}</div>
                  <p style="font-size: 0.85rem; color: #64748b; margin-top: 0.5rem;">
                    <i class="bi bi-calendar-check"></i> Expires: ${new Date(link.expiresAt).toLocaleDateString()} | 
                    <i class="bi bi-arrow-repeat"></i> Uses: ${link.usesCount}${link.maxUses ? '/' + link.maxUses : '/∞'}
                  </p>
                  ${link.message ? `<p style="color: #cbd5e1; font-style: italic; margin-top: 0.5rem;">"${link.message}"</p>` : ''}
                </div>
                <div class="d-flex gap-2 flex-column" style="min-width: 120px;">
                  <button class="btn btn-copy" onclick="copyToClipboard('${inviteUrl}')">
                    <i class="bi bi-clipboard"></i> Copy Link
                  </button>
                  <button class="btn btn-copy" onclick="copyToClipboard('${link.code}')">
                    <i class="bi bi-copy"></i> Copy Code
                  </button>
                  <button class="btn btn-delete" onclick="deleteInviteLink('${link._id || link.id}')">
                    <i class="bi bi-trash"></i> Delete
                  </button>
                </div>
              </div>
            </div>
          `;
        });

        container.innerHTML = html;
      } catch (error) {
        console.error('Failed to load invite links:', error);
        document.getElementById('inviteLinksContainer').innerHTML = 
          '<div style="color: #ef4444;"><i class="bi bi-exclamation-circle"></i> Failed to load invite links.</div>';
      }
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('Copied to clipboard!');
      }).catch(() => {
        alert('Failed to copy. Please try again.');
      });
    }

    async function deleteInviteLink(id) {
      if (!confirm('Delete this invite link?')) return;

      try {
        const res = await apiRequest(`/api/owner/invite-links/${id}`, { method: 'DELETE' });
        if (res.ok) {
          alert('Invite link deleted successfully!');
          loadInviteLinks();
        } else {
          const err = await res.json();
          alert('Error: ' + (err.error || 'Failed to delete'));
        }
      } catch (error) {
        console.error('Error deleting invite link:', error);
        alert('Failed to delete. Check console.');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!requireAuth()) return;
      loadTeams();
      loadInviteLinks();
    });
  </script>
</body>
</html>
