<!-- Static/playerselection.html -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RaidX - Select Players</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
  
  <!-- Extract token BEFORE auth.js loads -->
  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const urlToken = urlParams.get("token");
      if (urlToken) {
        localStorage.setItem('token', urlToken);
        localStorage.setItem('jwtToken', urlToken);
        localStorage.setItem('JWT_STORAGE_KEY', urlToken);
        document.cookie = `token=${urlToken}; path=/; SameSite=Strict`;
      }
    })();
  </script>
  
  <script src="/static/auth.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(145deg, #0f172a, #1e293b);
      color: white;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .floating-bg {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 122, 0, 0.3), transparent);
      animation: floatAnim 6s ease-in-out infinite;
      z-index: 0;
    }

    .circle1 {
      width: 200px;
      height: 200px;
      top: 10%;
      left: 5%;
    }

    .circle2 {
      width: 250px;
      height: 250px;
      bottom: 10%;
      right: 5%;
    }

    @keyframes floatAnim {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .form-container {
      position: relative;
      z-index: 1;
      background-color: rgba(30, 41, 59, 0.95);
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 0 20px rgba(255, 122, 0, 0.4);
      width: 100%;
      max-width: 600px;
    }

    h2 {
      text-align: center;
      color: #fbbf24;
      text-shadow: 1px 1px 4px black;
      margin-bottom: 1.5rem;
    }

    .player-checkbox {
      background-color: #1e293b;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      border-radius: 0.5rem;
      transition: background-color 0.3s ease;
    }

    .player-checkbox:hover {
      background-color: #334155;
    }

    .player-checkbox input[type="checkbox"] {
      margin-right: 10px;
    }

    .btn-submit {
      background: linear-gradient(45deg, #f97316, #ea580c);
      color: white;
      border: none;
      font-weight: bold;
      border-radius: 0.5rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 87, 34, 0.5);
      width: 100%;
      margin-top: 1rem;
    }

    .btn-submit:hover {
      background: linear-gradient(45deg, #ea580c, #f97316);
      transform: scale(1.03);
      box-shadow: 0 6px 20px rgba(255, 140, 0, 0.6);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1rem;
      color: #94a3b8;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
      color: #f8fafc;
    }
  </style>
</head>

<body>
  <!-- Floating Background Circles -->
  <div class="floating-bg circle1"></div>
  <div class="floating-bg circle2"></div>

  <!-- Navbar with logout -->
  <nav style="position:fixed;top:0;width:100%;background:rgba(0,0,0,0.9);padding:1rem 2rem;z-index:9999;display:flex;justify-content:space-between;align-items:center;">
    <h3 style="margin:0;color:#f97316;font-weight:bold;">RaidX - Player Selection</h3>
    <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
  </nav>

  <div class="form-container" style="margin-top:70px;">
    <h2>Select 7 Players for <span id="team-name"></span></h2>
    <form id="player-form">
      <div id="player-list"></div>
      <button type="submit" class="btn btn-submit">Confirm Selection</button>
    </form>
    <div style="margin-top:1rem;display:flex;justify-content:space-between;">
      <a href="/" class="back-link">← Back to Home</a>
    </div>
  </div>

  <script>
    // Wait for DOM to be ready and ensure token is loaded
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const normalizeParam = (value) => {
        if (!value) return null;
        if (value === 'null' || value === 'undefined') return null;
        return value;
      };

      const teamId = normalizeParam(params.get("team_id")) || normalizeParam(params.get("team1_id")) || normalizeParam(params.get("team2_id"));
      let teamKey = params.get("team_key");
      if (!teamKey) {
        const hasTeam1Name = normalizeParam(params.get("team1_name"));
        teamKey = hasTeam1Name ? "teamB_selected" : "teamA_selected";
      }
      let resolvedTeam1Id = normalizeParam(params.get("team1_id"));
      let resolvedTeam2Id = normalizeParam(params.get("team2_id"));
      
      // Get token from localStorage (should be saved by HEAD script)
      const token = (typeof getValidToken === 'function' ? getValidToken() : null) || localStorage.getItem('jwtToken') || localStorage.getItem('token');
      console.log('[PlayerSelection FETCH] Fetching team data with token:', token ? 'Present' : 'Missing');
      
      if (!token) {
        console.error('[PlayerSelection FETCH] No token found in localStorage!');
        return;
      }
      
      function loadTeamById(selectedTeamId) {
        if (!selectedTeamId) {
          console.error('[PlayerSelection FETCH] Missing team id for selection.');
          document.getElementById("player-list").innerHTML = '<div class="text-muted">Failed to load team players.</div>';
          return;
        }
        fetch(`/api/team/${selectedTeamId}`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        })
        .then(res => res.json())
        .then(team => {
        const teamName = team.team_name || team.TeamName || team.teamName || 'Team';
        document.getElementById("team-name").textContent = teamName;

        const list = document.getElementById("player-list");
        list.innerHTML = '';
        const players = team.players || team.Players || [];
        if (!Array.isArray(players) || players.length === 0) {
          list.innerHTML = '<div class="text-muted">No players found for this team.</div>';
          return;
        }

        const normalizePlayer = (player) => {
          const id = player._id || player.id || player.userId || player.user_id || player.ID || null;
          const name = player.fullName || player.name || player.full_name || player.email || 'Unnamed Player';
          return {
            id,
            _id: player._id || player.id || null,
            userId: player.userId || player.user_id || null,
            fullName: player.fullName || player.full_name || name,
            email: player.email || null
          };
        };

        players.forEach(player => {
          const normalized = normalizePlayer(player);
          const div = document.createElement("div");
          div.classList.add("player-checkbox");
          const displayName = normalized.fullName || normalized.email || 'Unnamed Player';
          div.innerHTML = `
            <label>
              <input type="checkbox" name="players" value='${JSON.stringify(normalized)}' />
              ${displayName}
            </label>
          `;
          list.appendChild(div);
        });
      })
      .catch(err => {
        console.error('Failed to load team:', err);
        document.getElementById("player-list").innerHTML = '<div class="text-muted">Failed to load team players.</div>';
      });
      }

      // If teamId is missing, resolve from tournament fixture
      const tournamentId = normalizeParam(params.get("tournament_id")) || normalizeParam(params.get("tournamentId"));
      const fixtureId = normalizeParam(params.get("fixture_id")) || normalizeParam(params.get("fixtureId"));
      if ((!teamId || !resolvedTeam1Id || !resolvedTeam2Id) && tournamentId && fixtureId) {
        apiRequest(`/api/tournaments/${tournamentId}/fixtures`)
          .then(res => res.json())
          .then(data => {
            const fixtures = data.fixtures || [];
            const fixture = fixtures.find(f => f.id === fixtureId);
            if (!fixture) {
              console.error('[PlayerSelection FETCH] Fixture not found for team resolution.');
              document.getElementById("player-list").innerHTML = '<div class="text-muted">Failed to load team players.</div>';
              return;
            }
            resolvedTeam1Id = fixture.team1Id;
            resolvedTeam2Id = fixture.team2Id;
            loadTeamById(teamKey === 'teamB_selected' ? fixture.team2Id : fixture.team1Id);
          })
          .catch(err => {
            console.error('[PlayerSelection FETCH] Failed to resolve team from fixture:', err);
            document.getElementById("player-list").innerHTML = '<div class="text-muted">Failed to load team players.</div>';
          });
      } else {
        loadTeamById(teamId);
      }

    document.getElementById("player-form").addEventListener("submit", function (e) {
      e.preventDefault();

      const selected = Array.from(document.querySelectorAll("input[name='players']:checked"))
        .map(cb => JSON.parse(cb.value));

      if (selected.length !== 7) {
        alert("You must select exactly 7 players.");
        return;
      }

      localStorage.setItem(teamKey, JSON.stringify(selected));
      const playerId = window.location.pathname.split("/").pop();

      const token = (typeof getValidToken === 'function' ? getValidToken() : null) || localStorage.getItem('jwtToken') || localStorage.getItem('token');

      if (teamKey === "teamA_selected") {
        const team1Id = resolvedTeam1Id || normalizeParam(params.get("team1_id"));
        const team2Id = resolvedTeam2Id || normalizeParam(params.get("team2_id"));
        if (!team1Id || !team2Id) {
          alert("Missing team IDs. Please restart match selection.");
          return;
        }
        const team1Name = document.getElementById("team-name").textContent;
        localStorage.setItem('team1_name', team1Name);
        const eventId = normalizeParam(params.get("event_id"));
        const tournamentId = normalizeParam(params.get("tournament_id")) || normalizeParam(params.get("tournamentId"));
        const fixtureId = normalizeParam(params.get("fixture_id")) || normalizeParam(params.get("fixtureId"));
        const token = (typeof getValidToken === 'function' ? getValidToken() : null) || localStorage.getItem('jwtToken') || localStorage.getItem('token');
        const eventParam = eventId ? `&event_id=${encodeURIComponent(eventId)}` : '';
        const tournamentParam = tournamentId ? `&tournament_id=${encodeURIComponent(tournamentId)}` : '';
        const fixtureParam = fixtureId ? `&fixture_id=${encodeURIComponent(fixtureId)}` : '';
        window.location.href = `/organizer/playerselection/${playerId}?team_id=${team2Id}&team_key=teamB_selected&team1_id=${team1Id}&team2_id=${team2Id}&team1_name=${encodeURIComponent(team1Name)}&match_id=${encodeURIComponent(playerId)}${eventParam}${tournamentParam}${fixtureParam}&token=${encodeURIComponent(token)}`;
      } else {
        const team1Id = resolvedTeam1Id || normalizeParam(params.get("team1_id"));
        const team2Id = resolvedTeam2Id || normalizeParam(params.get("team2_id"));
        if (!team1Id || !team2Id) {
          alert("Missing team IDs. Please restart match selection.");
          return;
        }
        const team1Name = normalizeParam(params.get("team1_name")) || localStorage.getItem('team1_name') || 'Team A';
        const team2Name = document.getElementById("team-name").textContent;
        const eventId = normalizeParam(params.get("event_id"));
        const tournamentId = normalizeParam(params.get("tournament_id")) || normalizeParam(params.get("tournamentId"));
        const fixtureId = normalizeParam(params.get("fixture_id")) || normalizeParam(params.get("fixtureId"));
        const token = (typeof getValidToken === 'function' ? getValidToken() : null) || localStorage.getItem('jwtToken') || localStorage.getItem('token');
        const eventParam = eventId ? `&event_id=${encodeURIComponent(eventId)}` : '';
        const tournamentParam = tournamentId ? `&tournament_id=${encodeURIComponent(tournamentId)}` : '';
        const fixtureParam = fixtureId ? `&fixture_id=${encodeURIComponent(fixtureId)}` : '';
        window.location.href = `/scorer?team1_id=${team1Id}&team2_id=${team2Id}&team1_name=${encodeURIComponent(team1Name)}&team2_name=${encodeURIComponent(team2Name)}&match_id=${encodeURIComponent(playerId)}${eventParam}${tournamentParam}${fixtureParam}&token=${encodeURIComponent(token)}`;
      }
    });
    
    }); // End DOMContentLoaded
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
