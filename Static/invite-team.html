<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RaidX - Join Team via Invite Link</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <script src="/static/auth.js"></script>
  <style>
    body {
      background: linear-gradient(145deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .invite-container {
      background-color: rgba(30, 41, 59, 0.95);
      padding: 3rem;
      border-radius: 1rem;
      box-shadow: 0 0 20px rgba(255, 122, 0, 0.4);
      max-width: 500px;
      width: 100%;
    }

    .invite-container h2 {
      text-align: center;
      color: #fbbf24;
      margin-bottom: 2rem;
    }

    .team-info {
      background-color: #1e293b;
      padding: 1.5rem;
      border-radius: 0.75rem;
      margin-bottom: 2rem;
      border-left: 4px solid #f97316;
    }

    .team-info h4 {
      color: #f97316;
      margin-bottom: 0.5rem;
    }

    .team-name {
      font-size: 1.5rem;
      font-weight: bold;
      color: #e2e8f0;
    }

    .btn-accept {
      background: linear-gradient(45deg, #f97316, #ea580c);
      color: white;
      border: none;
      font-weight: bold;
      border-radius: 0.5rem;
      padding: 0.75rem 2rem;
      width: 100%;
      transition: all 0.3s ease;
      margin-bottom: 0.5rem;
    }

    .btn-accept:hover {
      background: linear-gradient(45deg, #ea580c, #f97316);
      transform: scale(1.02);
      color: white;
    }

    .btn-decline {
      background-color: #334155;
      color: white;
      border: none;
      font-weight: bold;
      border-radius: 0.5rem;
      padding: 0.75rem 2rem;
      width: 100%;
      transition: all 0.3s ease;
    }

    .btn-decline:hover {
      background-color: #475569;
    }

    .message {
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
      text-align: center;
    }

    .message.success {
      background-color: #10b981;
      color: white;
    }

    .message.error {
      background-color: #ef4444;
      color: white;
    }

    .message.info {
      background-color: #3b82f6;
      color: white;
    }

    .auth-prompt {
      background-color: #1e293b;
      padding: 1.5rem;
      border-radius: 0.75rem;
      border-left: 4px solid #f97316;
    }

    .auth-prompt p {
      margin-bottom: 1rem;
      color: #cbd5e1;
    }

    .auth-prompt a {
      color: #f97316;
      text-decoration: none;
      font-weight: bold;
    }

    .auth-prompt a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="invite-container">
    <h2><i class="bi bi-shield-fill"></i> Team Invite Link</h2>

    <div id="authSection" style="display: none;">
      <div class="auth-prompt">
        <p><strong>You need to be logged in to accept this invite.</strong></p>
        <p>Please <a id="loginLink" href="/login">login</a> to your account or <a href="/signup">create a new account</a>.</p>
      </div>
    </div>

    <div id="loadingSection">
      <div class="text-center">
        <div class="spinner-border text-warning" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3">Loading invite details...</p>
      </div>
    </div>

    <div id="contentSection" style="display: none;">
      <div id="message"></div>

      <div class="team-info">
        <h4>You're invited to join:</h4>
        <div class="team-name" id="teamName">Loading...</div>
      </div>

      <div id="actionButtons">
        <button class="btn btn-accept" onclick="acceptInvite()">
          <i class="bi bi-check-circle"></i> Accept & Wait for Approval
        </button>
        <button class="btn btn-decline" onclick="goBack()">
          <i class="bi bi-x-circle"></i> Decline
        </button>
      </div>

      <div id="approvalMessage" style="display: none; margin-top: 2rem; padding: 1rem; background-color: #1e293b; border-radius: 0.5rem; border-left: 4px solid #10b981; color: #cbd5e1;">
        <i class="bi bi-info-circle"></i> Your request has been sent. The team owner will review and approve your membership soon.
      </div>
    </div>
  </div>

  <script>
    const token = window.location.pathname.split('/').pop();
    
    function normalizeRole(role) {
      return (role || '').toString().toLowerCase().trim();
    }

    function setLoginLink() {
      const loginLink = document.getElementById('loginLink');
      if (loginLink) {
        const returnUrl = encodeURIComponent(window.location.href);
        loginLink.href = `/login?returnUrl=${returnUrl}`;
      }
    }

    async function loadInviteDetails() {
      const authToken = getValidToken();
      setLoginLink();

      if (!authToken) {
        document.getElementById('authSection').style.display = 'block';
        document.getElementById('loadingSection').style.display = 'none';
        return;
      }

      try {
        const response = await fetch(`/api/invite-link/team/${token}/details`);
        
        if (response.ok) {
          const data = await response.json();
          document.getElementById('teamName').textContent = data.teamName || 'Unknown Team';
          document.getElementById('contentSection').style.display = 'block';

          const requiredRole = normalizeRole(data.requiredRole);
          const currentRole = normalizeRole(getRoleFromToken());
          if (requiredRole && currentRole && requiredRole !== currentRole) {
            showMessage(`This invite requires a ${requiredRole} account. You are logged in as ${currentRole}.`, 'error');
            document.getElementById('actionButtons').style.display = 'none';
            document.getElementById('loadingSection').style.display = 'none';
            return;
          }

          if (authToken && currentRole === 'player') {
            await claimInviteAndRedirect(authToken);
            return;
          }
        } else {
          showMessage('Invalid or expired invite link', 'error');
        }
      } catch (error) {
        console.error('Error loading invite:', error);
        showMessage('Failed to load invite details', 'error');
      }

      document.getElementById('loadingSection').style.display = 'none';
    }

    async function claimInviteAndRedirect(authToken) {
      try {
        const response = await fetch(`/api/invite-link/team/${token}/claim`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${authToken}`,
          }
        });

        if (response.ok) {
          window.location.href = '/player/dashboard';
          return;
        }

        const data = await response.json();
        showMessage(data.error || 'Failed to claim invite', 'error');
        document.getElementById('contentSection').style.display = 'block';
      } catch (error) {
        console.error('Error claiming invite:', error);
        showMessage('An error occurred. Please try again.', 'error');
        document.getElementById('contentSection').style.display = 'block';
      } finally {
        document.getElementById('loadingSection').style.display = 'none';
      }
    }

    async function acceptInvite() {
      const authToken = getValidToken();
      if (!authToken) {
        const returnUrl = encodeURIComponent(window.location.href);
        window.location.href = `/login?returnUrl=${returnUrl}`;
        return;
      }

      const currentRole = normalizeRole(getRoleFromToken());
      if (currentRole && currentRole !== 'player') {
        showMessage(`Only player accounts can accept this invite. You are logged in as ${currentRole}.`, 'error');
        return;
      }

      try {
        const response = await fetch(`/api/invite-link/team/${token}/accept`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${authToken}`,
          }
        });

        const data = await response.json();

        if (response.ok) {
          document.getElementById('actionButtons').style.display = 'none';
          document.getElementById('approvalMessage').style.display = 'block';
          showMessage('✅ Request sent! Waiting for team owner approval.', 'success');
        } else {
          showMessage(data.error || 'Failed to accept invite', 'error');
        }
      } catch (error) {
        console.error('Error accepting invite:', error);
        showMessage('An error occurred. Please try again.', 'error');
      }
    }

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
    }

    function goBack() {
      if (getValidToken()) {
        window.location.href = '/player/dashboard';
      } else {
        window.location.href = '/';
      }
    }

    // Load on page load
    document.addEventListener('DOMContentLoaded', loadInviteDetails);
  </script>
</body>

</html>
