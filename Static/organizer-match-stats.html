<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RaidX - Match Stats</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <script src="/static/auth.js"></script>
  <style>
    body {
      background: linear-gradient(145deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      padding: 2rem 0;
    }
    .navbar {
      background-color: rgba(0, 0, 0, 0.85);
      padding: 1rem 2rem;
      margin-bottom: 2rem;
    }
    .navbar-brand {
      font-weight: bold;
      color: #f97316 !important;
      font-size: 1.5rem;
    }
    .container {
      max-width: 1200px;
    }
    .page-header h1 {
      color: #fbbf24;
      font-weight: bold;
    }
    .card {
      background-color: #1e293b;
      border: 1px solid #334155;
      color: white;
      margin-bottom: 1.5rem;
    }
    .card-header {
      background-color: #0f172a;
      border-bottom: 1px solid #334155;
    }
    .score {
      font-size: 2rem;
      font-weight: bold;
      color: #fbbf24;
    }
    .scorecard-box {
      background: rgba(15,23,42,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.75rem;
      padding: 1rem;
    }
    .player-card {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(30,41,59,0.7);
      border-radius: 0.6rem;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
      transition: all 0.2s ease;
    }
    .player-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.35rem;
    }
    .player-name {
      font-weight: 700;
      color: #fbbf24;
    }
    .player-stats-line {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      color: #e2e8f0;
    }
    .btn-primary-orange {
      background: linear-gradient(45deg, #f97316, #ea580c);
      color: white;
      border: none;
      font-weight: bold;
      border-radius: 0.5rem;
      padding: 0.5rem 1.5rem;
      transition: all 0.3s ease;
    }
    .btn-primary-orange:hover {
      background: linear-gradient(45deg, #ea580c, #f97316);
      color: white;
      transform: scale(1.02);
    }
  </style>
</head>
<body data-role="organizer">
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">
        <i class="bi bi-lightning-fill"></i> RaidX
      </a>
      <div class="ms-auto d-flex gap-2 align-items-center">
        <a class="btn btn-outline-light btn-sm" id="back-to-tournament" href="#">
          <i class="bi bi-arrow-left"></i> Back
        </a>
        <a class="btn btn-outline-light btn-sm" href="/organizer/dashboard">
          <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header mb-4 d-flex justify-content-between align-items-center">
      <div>
        <h1><i class="bi bi-bar-chart"></i> Match Stats</h1>
        <p class="text-muted" id="match-subtitle"></p>
      </div>
      <button class="btn btn-outline-light btn-sm" id="share-match-stats-btn" type="button">
        <i class="bi bi-share"></i> Share Match
      </button>
    </div>

    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0" id="match-title">Match</h5>
      </div>
      <div class="card-body text-center">
        <div class="score" id="match-score">-</div>
        <div id="match-winner" style="color:#fbbf24; font-weight:600;"></div>
        <div id="match-toss-info" style="color:#e2e8f0; font-weight:600; margin-top:0.5rem;"></div>
        <div id="match-awards" style="color:#e2e8f0; font-weight:600; margin-top:0.5rem;"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h5 class="mb-0">Player Stats</h5>
      </div>
      <div class="card-body">
        <div class="row g-4">
          <div class="col-lg-6">
            <div class="scorecard-box">
              <h6 class="text-warning" id="teamA-stats-title">Team A Players</h6>
              <div id="player-stats-body-teamA"></div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="scorecard-box">
              <h6 class="text-warning" id="teamB-stats-title">Team B Players</h6>
              <div id="player-stats-body-teamB"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/share-utils.js"></script>
  <script>
    function normalizeParam(value) {
      if (!value) return null;
      if (value === 'null' || value === 'undefined') return null;
      return value;
    }

    async function loadMatchStats() {
      if (!requireAuth()) return;
      const pathParts = window.location.pathname.split('/');
      const matchId = pathParts[pathParts.indexOf('match') + 1];
      const params = new URLSearchParams(window.location.search);
      const tournamentId = normalizeParam(params.get('tournament_id')) || normalizeParam(params.get('tournamentId'));
      const championshipId = normalizeParam(params.get('championship_id')) || normalizeParam(params.get('championshipId'));
      const shareBtn = document.getElementById('share-match-stats-btn');

      const backBtn = document.getElementById('back-to-tournament');
      if (backBtn) {
        if (tournamentId) {
          backBtn.href = `/organizer/tournament?id=${encodeURIComponent(tournamentId)}`;
        } else if (championshipId) {
          backBtn.href = `/organizer/championship?id=${encodeURIComponent(championshipId)}`;
          backBtn.innerHTML = '<i class="bi bi-arrow-left"></i> Back to Championship';
        } else {
          backBtn.style.display = 'none';
        }
      }

      if (!matchId) {
        document.getElementById('match-title').textContent = 'Match not found';
        return;
      }

      if (shareBtn) {
        shareBtn.onclick = () => {
          const link = buildViewerShareLink('match', matchId);
          shareViewerLink(link, { title: 'Share Match Viewer Link', copiedMessage: 'Match viewer link copied.' });
        };
      }

      try {
        const res = await apiRequest(`/api/match/${matchId}`);
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || 'Failed to load match stats');
        }

        const teamA = data?.data?.teamA || {};
        const teamB = data?.data?.teamB || {};
        const teamAName = normalizeParam(teamA.name) || 'Team A';
        const teamBName = normalizeParam(teamB.name) || 'Team B';
        const teamAScore = teamA.score || 0;
        const teamBScore = teamB.score || 0;

        document.getElementById('match-title').textContent = `${teamAName} vs ${teamBName}`;
        document.getElementById('match-score').textContent = `${teamAScore} - ${teamBScore}`;

        let winnerText = 'Draw';
        if (teamAScore > teamBScore) winnerText = `Winner: ${teamAName}`;
        if (teamBScore > teamAScore) winnerText = `Winner: ${teamBName}`;
        document.getElementById('match-winner').textContent = winnerText;

        const tossWinner = data?.data?.tossWinner || data?.tossWinner;
        const tossDecision = data?.data?.tossDecision || data?.tossDecision;
        const tossWinnerName = tossWinner === 'teamB' ? teamBName : (tossWinner === 'teamA' ? teamAName : null);
        const tossDecisionText = tossDecision === 'defend' ? 'Defend First' : (tossDecision ? 'Raid First' : null);
        const tossEl = document.getElementById('match-toss-info');
        if (tossEl) {
          if (tossWinnerName) {
            tossEl.textContent = `Toss: ${tossWinnerName} | Decided To: ${tossDecisionText || 'â€”'}`;
          } else {
            tossEl.textContent = '';
          }
        }

        const awards = data?.data?.awards || data?.awards || data?.Awards || {};
        const awardsEl = document.getElementById('match-awards');
        if (awardsEl) {
          const mvp = awards.mvp;
          const bestRaider = awards.bestRaider;
          const bestDefender = awards.bestDefender;
          const parts = [];
          if (mvp?.name) parts.push(`MVP: ${mvp.name} (${mvp.points || 0})`);
          if (bestRaider?.name) parts.push(`Best Raider: ${bestRaider.name} (${bestRaider.points || 0})`);
          if (bestDefender?.name) parts.push(`Best Defender: ${bestDefender.name} (${bestDefender.points || 0})`);
          awardsEl.textContent = parts.join(' â€¢ ');
        }

        const playerStats = data?.data?.playerStats || {};
        const teamAPlayers = new Set(data?.data?.teamAPlayerIds || data?.data?.TeamAPlayerIDs || []);
        const teamBPlayers = new Set(data?.data?.teamBPlayerIds || data?.data?.TeamBPlayerIDs || []);
        const teamACaptainId = data?.data?.teamACaptainId || data?.data?.TeamACaptainID || '';
        const teamAViceCaptainId = data?.data?.teamAViceCaptainId || data?.data?.TeamAViceCaptainID || '';
        const teamBCaptainId = data?.data?.teamBCaptainId || data?.data?.TeamBCaptainID || '';
        const teamBViceCaptainId = data?.data?.teamBViceCaptainId || data?.data?.TeamBViceCaptainID || '';
        const teamAResolvedName = teamAName || 'Team A';
        const teamBResolvedName = teamBName || 'Team B';
        const playerEntries = Object.entries(playerStats);
        const splitIndex = Math.ceil(playerEntries.length / 2);

        const teamAList = [];
        const teamBList = [];

        const renderCard = (id, name, p, side) => {
          const raid = p.raidPoints || 0;
          const def = p.defencePoints || 0;
          const total = p.totalPoints || 0;
          const superRaids = p.superRaids || 0;
          const superTackles = p.superTackles || 0;
          const isCaptain = p.isCaptain || p.IsCaptain || (side === 'A' ? id === teamACaptainId : id === teamBCaptainId);
          const isViceCaptain = p.isViceCaptain || p.IsViceCaptain || (side === 'A' ? id === teamAViceCaptainId : id === teamBViceCaptainId);
          const namePrefix = isCaptain ? '(C) ' : (isViceCaptain ? '(VC) ' : '');
          const status = (p.status || '').toLowerCase();
          const statusBadge = status === 'out'
            ? '<span style="color:#f87171;font-weight:600;">OUT</span>'
            : '<span style="color:#34d399;font-weight:600;">IN</span>';

          return `
            <div class="player-card">
              <div class="player-card-head">
                <div class="player-name">${namePrefix}${name}</div>
                <div>${statusBadge}</div>
              </div>
              <div class="player-stats-line">
                <div>Raid: <strong>${raid}</strong></div>
                <div>Defence: <strong>${def}</strong></div>
                <div>Total: <strong>${total}</strong></div>
                <div>Super Raids: <strong>${superRaids}</strong></div>
                <div>Super Tackles: <strong>${superTackles}</strong></div>
              </div>
            </div>
          `;
        };

        playerEntries.forEach(([id, p], index) => {
          const name = p.fullName || p.name || p.email || 'Player';
          let side = null;
          if (teamAPlayers.has(id)) side = 'A';
          else if (teamBPlayers.has(id)) side = 'B';
          else side = index < splitIndex ? 'A' : 'B';

          const card = renderCard(id, name, p, side);

          if (teamAPlayers.has(id)) {
            teamAList.push(card);
            return;
          }
          if (teamBPlayers.has(id)) {
            teamBList.push(card);
            return;
          }

          if (index < splitIndex) teamAList.push(card);
          else teamBList.push(card);
        });

        document.getElementById('teamA-stats-title').textContent = `${teamAResolvedName} Players`;
        document.getElementById('teamB-stats-title').textContent = `${teamBResolvedName} Players`;
        document.getElementById('player-stats-body-teamA').innerHTML = teamAList.join('') || '<div class="text-muted">No player stats found.</div>';
        document.getElementById('player-stats-body-teamB').innerHTML = teamBList.join('') || '<div class="text-muted">No player stats found.</div>';
      } catch (err) {
        document.getElementById('match-title').textContent = 'Failed to load match stats';
        document.getElementById('match-subtitle').textContent = err.message;
      }
    }

    document.addEventListener('DOMContentLoaded', loadMatchStats);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/branding.js"></script>
</body>
</html>
